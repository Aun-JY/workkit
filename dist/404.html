<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>WorkKit</title>
  <script>
    /* GitHub Pages SPA - 404 redirect trick
       경로를 쿼리스트링으로 인코딩해서 index.html로 리다이렉트 */
    var pathSegmentsToKeep = 1; // /workkit/ → 1 segment
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + '/' +
      l.pathname.slice(1).split('/').slice(0, pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
